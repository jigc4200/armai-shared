# GitLab CI/CD Pipeline for armai-shared
# Shared Python package with semantic versioning

image: python:3.11-slim

variables:
  # Project variables
  PYTHONPATH: "${CI_PROJECT_DIR}"
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/pip"
  
  # Package registry
  PACKAGE_NAME: "armai-shared"
  PACKAGE_VERSION: "${CI_COMMIT_TAG:-0.0.0-dev}"
  PYPI_REPOSITORY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi"

# Cache dependencies between jobs
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - .venv/

stages:
  - validate
  - test
  - security
  - publish
  - notify

# Job templates
.python-base: &python-base
  before_script:
    - python --version
    - pip install uv
    - uv venv .venv
    - source .venv/bin/activate

# VALIDATION STAGE
validate-lint:
  stage: validate
  <<: *python-base
  script:
    - echo "Running code linting and formatting checks..."
    - uv pip install ruff mypy black
    - ruff check shared/ models/
    - black --check shared/ models/
    - mypy --ignore-missing-imports shared/ models/
  cache:
    policy: pull

validate-dependencies:
  stage: validate
  <<: *python-base
  script:
    - echo "Checking dependencies for security vulnerabilities..."
    - uv pip install safety
    - safety check --full-report
  cache:
    policy: pull

# TEST STAGE
test-shared:
  stage: test
  <<: *python-base
  script:
    - echo "Testing shared utilities..."
    - uv pip install pytest pytest-asyncio pytest-cov
    - pytest shared/tests -v --cov=shared --cov-report=xml
  artifacts:
    reports:
      junit: reports/junit-shared.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-shared.xml
    paths:
      - coverage/
    expire_in: 1 week
  coverage: '/TOTAL.*\s+(\d+%)$/'

test-models:
  stage: test
  <<: *python-base
  script:
    - echo "Testing models package..."
    - cd models
    - uv pip install -e .
    - uv pip install pytest pytest-cov
    - pytest tests -v --cov=models --cov-report=xml
    - cd ..
  artifacts:
    reports:
      junit: reports/junit-models.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-models.xml
    paths:
      - models/coverage/
    expire_in: 1 week

# SECURITY STAGE
dependency-scan:
  stage: security
  image: aquasec/trivy:latest
  script:
    - echo "Scanning dependencies for vulnerabilities..."
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL .
  only:
    - main
    - merge_requests

# PUBLISH STAGE
build-package:
  stage: publish
  <<: *python-base
  script:
    - echo "Building Python package..."
    - cd models
    - uv build
    - cd ..
  artifacts:
    paths:
      - models/dist/
    expire_in: 1 week
  only:
    - tags
    - main

publish-package:
  stage: publish
  <<: *python-base
  script:
    - echo "Publishing package to GitLab Package Registry..."
    - cd models
    - uv pip install twine
    - |
      cat > .pypirc << 'EOF'
      [distutils]
      index-servers = gitlab

      [gitlab]
      repository = ${PYPI_REPOSITORY_URL}
      username = gitlab-ci-token
      password = ${CI_JOB_TOKEN}
      EOF
    - python -m twine upload --repository gitlab dist/*
  only:
    - tags

# SEMANTIC RELEASE
semantic-release:
  stage: publish
  image: node:20-alpine
  script:
    - echo "Running semantic release..."
    - npm install -g semantic-release @semantic-release/changelog @semantic-release/git
    - npx semantic-release
  only:
    - main
  when: manual

# NOTIFICATION STAGE
notify-teams:
  stage: notify
  script:
    - echo "Notifying dependent services about new version..."
    # This would trigger pipelines in dependent repositories
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        echo "New version ${CI_COMMIT_TAG} released. Triggering updates in dependent services..."
        # In practice, you would use GitLab API to trigger pipelines
        # curl --request POST --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        #   "${CI_API_V4_URL}/projects/${DEPENDENT_PROJECT_ID}/pipeline?ref=main"
      fi
  only:
    - tags

# COMPATIBILITY CHECK
compatibility-check:
  stage: test
  <<: *python-base
  script:
    - echo "Checking backward compatibility..."
    - uv pip install pycobertura
    # Compare API signatures with previous version
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        echo "Running API compatibility check..."
        python scripts/check_compatibility.py
      else
        echo "Skipping compatibility check for non-tagged commits."
      fi
  only:
    - tags
  allow_failure: true

# HOUSEKEEPING
cleanup:
  stage: .post
  script:
    - echo "Cleaning up temporary files..."
    - rm -rf .venv __pycache__ *.pyc
  when: always